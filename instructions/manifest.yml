name: reallocation-instructions
title: "The Reallocation Engine agent instructions (source for AGENTS.md + CLAUDE.md)"

# Shared rule modules — the portable ~95%, the SAME library Madison and Mycroft
# draw from (vendored per-repo so the three can diverge without coupling).
# Selects all six: backing tools/files all present (SNICKERDOODLE.md, DOMAIN.md,
# conformance.mjs, to-markdown.mjs). Order = output order.
shared:
  - governance.md
  - markdown-default.md
  - visual-media.md
  - "no-delete.md"
  - conformance-gate.md
  - subagent-scoping.md
  - completion-report.md

# Project-specific source (identity, layout rules, the help menu).
project: reallocation-engine.md

# Appended ONLY to CLAUDE.md (Claude supports @import; other tools read AGENTS.md).
claude_only:
  - "## Claude Code"
  - "@SNICKERDOODLE.md"
  - "- Use plan mode before edits under recipes/, data/, or anything touching data/ats/ (private)."

# Output adapters to generate. AGENTS.md is canonical (inlined); every other entry
# is a thin shim that POINTS at AGENTS.md (no rule duplication, regenerated each
# build so it cannot drift). Add/remove tools here as the toolchain changes.
targets:
  - agents    # AGENTS.md — canonical cross-tool standard (Codex, Cursor, Copilot, Gemini read it)
  - claude    # CLAUDE.md — @import AGENTS.md + Claude-only tail
  - gemini    # .gemini/settings.json — context.fileName → AGENTS.md
  - aider     # .aider.conf.yml — read: AGENTS.md
  - copilot   # .github/copilot-instructions.md — pointer to AGENTS.md
  - cursor    # .cursor/rules/reallocation-engine.mdc — alwaysApply pointer to AGENTS.md
